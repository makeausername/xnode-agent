name: CI

on:
  push:
  pull_request:

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Test
        run: go test ./...
      - name: Vet
        run: go vet ./...

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: go
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -f deploy/Dockerfile -t xnode-agent:ci .
